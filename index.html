<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suta Dhamma Diploma - Level 1</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #8e44ad;
            --primary-dark: #2c003e;
            --accent-gold: #d4af37;
            --text-main: #2c3e50;
            --bg-main: #ffffff;
            --bg-sub: #f8f9fa;
            --border-color: #eaeaea;
            --font-my: 'Noto Sans Myanmar', sans-serif;
        }

        [data-theme="dark"] {
            --bg-main: #1a1a1a;
            --bg-sub: #2d2d2d;
            --text-main: #e0e0e0;
            --border-color: #404040;
        }

        /* --- Splash Screen (Clean UI) --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--primary-dark);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease, visibility 0.8s;
        }
        .splash-logo { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 4px solid var(--accent-gold); animation: pulse 2.5s infinite; }
        .splash-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #ffffff; font-weight: bold; margin-top: 25px; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* --- Main UI --- */
        #main-content { opacity: 0; transition: opacity 1s ease; display: none; }
        body { font-family: var(--font-my); margin: 0; background-color: var(--bg-main); color: var(--text-main); transition: 0.3s; }
        .container { max-width: 900px; margin: 0 auto; padding: 0 15px; }
        
        header { border-bottom: 1px solid var(--border-color); padding: 10px 0; background: var(--bg-main); position: sticky; top: 0; z-index: 100; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; }

        .theme-toggle {
            background: var(--bg-sub); border: 1px solid var(--border-color); color: var(--text-main);
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.2rem;
            display: flex; justify-content: center; align-items: center;
        }

        .hero { text-align: center; padding: 30px 0; }
        .level-badge { display: inline-block; background: var(--primary-color); color: white; padding: 4px 15px; border-radius: 20px; font-size: 0.85rem; margin-bottom: 10px; }
        
        .lesson-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 40px; }
        .lesson-card { background: var(--bg-sub); padding: 18px; border-radius: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; border: 1px solid var(--border-color); }
        .lesson-card:hover { border-color: var(--primary-color); transform: translateY(-2px); }

        .hidden { display: none; }
        .back-btn { background: var(--bg-sub); border: 1px solid var(--border-color); color: var(--text-main); cursor: pointer; padding: 10px 20px; border-radius: 25px; margin: 10px 0; font-weight: bold; }
        
        .player-section { background: var(--bg-sub); border-radius: 15px; padding: 15px; }
        audio { width: 100%; margin: 15px 0; }
        .pdf-wrapper { width: 100%; height: 75vh; border-radius: 10px; overflow: hidden; border: 1px solid var(--border-color); background: #525659; margin-top: 15px; }
        iframe { width: 100%; height: 100%; border: none; }
        .header-logo-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary-color); }

        @media (max-width: 600px) { .hero h1 { font-size: 1.5rem; } }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://rr4---sn-npoeenl7.googlevideo.com/videoplayback?expire=1773996862&ei=3ra8aa-jLr6DybgPmIOO4QI&ip=99.105.80.80&id=o-ADnOcdYen_esaSstv92LfW5In26qp6tvxsyPAFbOEOyx&itag=140&source=youtube&requiressl=yes&xpc=EgVo2aDSNQ%3D%3D&cps=289&bui=AVNa5-zsgEKf-nKiECepzfTy-VJlDSemMNg8INkCLpaaksa4ueKXBqrzvAl_dMETsbB6pmWcBPS9E_e3&spc=6dlaFJijV5C79x_25scOoYQAD0LrLClLxPvC_G8SxvhweKcY9_Soem-pBVp0hvI7FXg6yw&vprv=1&svpuc=1&mime=audio%2Fmp4&ns=DT1vM5ZLxzPflZbT0NsBv8MT&rqh=1&gir=yes&clen=6849206&dur=423.160&lmt=1742631468684538&keepalive=yes&fexp=51565116,51565682,51791334&c=WEB_EMBEDDED_PLAYER&sefc=1&txp=5432534&n=zxI-U9G7BeDiHQ&sparams=expire%2Cei%2Cip%2Cid%2Citag%2Csource%2Crequiressl%2Cxpc%2Cbui%2Cspc%2Cvprv%2Csvpuc%2Cmime%2Cns%2Crqh%2Cgir%2Cclen%2Cdur%2Clmt&sig=AHEqNM4wRAIgPV731EhOEJrMr1uekMYD8Y0WP7-JeXrXOj0S7VsZ1e0CIGefUQnhuROUb5iz22QfaLzKLBc3U5fvn2P2qEYmURkz&rm=sn-bvvbaxivnuxq5uu-vgqs7l,sn-vgqek77z&rrc=79,104&req_id=c1f70c83b1a1a3ee&cmsv=e&rms=rdu,au&redirect_counter=2&cms_redirect=yes&ipbypass=yes&met=1773975298,&mh=CV&mip=37.111.44.231&mm=29&mn=sn-npoeenl7&ms=rdu&mt=1773975174&mv=m&mvi=4&pl=24&lsparams=cps,ipbypass,met,mh,mip,mm,mn,ms,mv,mvi,pl,rms&lsig=APaTxxMwRQIhANiceIWlf-xATV3AFsjo3nW1hWGjT0R5RudHzt4WCvV-AiBxEfuaQ129ofl0nHXYKpI-D8Upmt0kO0_iXcTc1JsysA%3D%3D" type="audio/mp4">
    </audio>

    <div id="splash-screen">
        <img src="https://i.ibb.co/LDh3jzBD/Sayadaw-nandamalabhivamsa.jpg" alt="Sayadaw" class="splash-logo">
        <div class="splash-title">University Of Wisdom Land</div>
        <p style="color: var(--accent-gold); margin-top: 10px; font-weight: bold;">သုတဓမ္မ ဒီပလိုမာ</p>
    </div>

    <div id="main-content">
        <header>
            <div class="container header-flex">
                <div style="display:flex; align-items:center; gap:12px;">
                    <img src="https://i.ibb.co/LDh3jzBD/Sayadaw-nandamalabhivamsa.jpg" alt="Logo" class="header-logo-img">
                    <div style="line-height: 1.2;">
                        <strong style="display:block; font-size: 1.1rem;">Suta Dhamma Diploma</strong>
                        <span style="font-size:0.75rem; color:var(--accent-gold)">University Of Wisdom Land</span>
                    </div>
                </div>
                <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">☀️</button>
            </div>
        </header>

        <main class="container">
            <div id="home-page">
                <section class="hero">
                    <div class="level-badge">Diploma Level - 1</div>
                    <h1 style="margin:0; font-family:'Playfair Display'; color: var(--primary-color);">University Of Wisdom Land</h1>
                    <p style="color:var(--accent-gold); font-size: 1.1rem; margin-top: 8px;">သုတဓမ္မ ဒီပလိုမာ သင်တန်းတော်များ</p>
                </section>
                <div class="lesson-list" id="main-list"></div>
            </div>

            <div id="player-page" class="hidden">
                <button class="back-btn" onclick="showHome()">← သင်ခန်းစာစာရင်းသို့</button>
                <h3 id="display-title" style="margin: 10px 0; border-left: 5px solid var(--primary-color); padding-left: 10px;">ခေါင်းစဉ်</h3>
                <div class="player-section">
                    <audio id="audio-ctrl" controls><source src="" type="audio/mpeg"></audio>
                    <div class="pdf-wrapper">
                        <iframe id="pdf-viewer" src=""></iframe>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const bgMusic = document.getElementById('bg-music');
        const lessonAudio = document.getElementById('audio-ctrl');

        // Automatic Transition after 3 seconds
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const content = document.getElementById('main-content');
                
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    content.style.display = 'block';
                    setTimeout(() => content.style.opacity = '1', 50);
                    
                    // Try to play (will work if user interacted with the page before)
                    bgMusic.play().catch(() => {
                        console.log("Waiting for user interaction to play audio.");
                        // Play on first click anywhere on the page
                        document.body.addEventListener('click', () => {
                            bgMusic.play();
                        }, { once: true });
                    });
                }, 800);
            }, 3000);
        });

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('theme-btn');
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                btn.innerText = '☀️';
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.innerText = '🌙';
            }
        }

        const lessons = [
            { id: 1, title: "ဘဝခရီးဝယ်ရွေးချယ်ရမည့်လမ်း", audio: "https://dhammadownload.com/MP3Library/University-Of-Wisdom-Land/Diploma-in-Sutadhamma/001-UOWL-Sutadhamma-2007-07-25-bawakhayeewair.mp3", pdf: "https://dhammadownload.com/File-Library/University-Of-Wisdom-Land/Diploma-in-Sutadhamma/UOWL-A4-Book1.pdf" },
            { id: 2, title: "မေတ္တသုတ်အနှစ်ချုပ်", audio: "https://dhammadownload.com/MP3Library/University-Of-Wisdom-Land/Diploma-in-Sutadhamma/004-UOWL-Sutadhamma-2009-12-20-MettaThoatAhNhitChoke.mp3", pdf: "https://gtg-drnandamala.s3.ap-southeast-1.amazonaws.com/wp-content/uploads/2022/01/14023742/%E1%80%99%E1%80%B1%E1%80%90%E1%80%B9%E1%80%90%E1%80%AC%E1%80%9E%E1%80%AF%E1%80%90%E1%80%BA%E1%80%A1%E1%80%94%E1%80%BE%E1%80%85%E1%80%BA%E1%80%81%E1%80%BB%E1%80%AF%E1%80%95%E1%80%BA.pdf" },
            { id: 3, title: "စိတ်၏အညစ်အကြေးများကို ဖယ်ရှားခြင်း", audio: "https://dhammadownload.com/MP3Library/University-Of-Wisdom-Land/Diploma-in-Sutadhamma/003-UOWL-Sutadhamma-2011-02-13-SateEiAhNyitAhKayeMyar.mp3", pdf: "https://www.universitywisdomland.edu.mm/wp-content/uploads/2022/06/56-Dr-Nandamala-SaitEiAhNyitAhKayeMyarKoPawelSharChin.pdf" },
            { id: 4, title: "မြတ်ဗုဒ္ဒဒေသနာနှင့်‌ယနေ့ကမ္ဘာ", audio: "https://dhammadownload.com/MP3Library/University-Of-Wisdom-Land/Diploma-in-Sutadhamma/002-UOWL-Sutadhamma-MyatBuddhaNhitYaNaeKabar.mp3", pdf: "https://dhammadownload.com/File-Library/University-Of-Wisdom-Land/Diploma-in-Sutadhamma/UOWL-A4-Book2.pdf" },
            { id: 5, title: "သမထနှင့် ဝိပဿနာ", audio: "https://dhammadownload.com/MP3Library/University-Of-Wisdom-Land/Diploma-in-Sutadhamma/005-UOWL-Sutadhamma-2008-12-18-samatha-and-vipassana.mp3", pdf: "https://www.universitywisdomland.edu.mm/wp-content/uploads/2022/06/Dr-Nandamalabhivamsa-ThaMaHtaNhintWiPaThaNar-compressed.pdf" }
        ];

        const listContainer = document.getElementById('main-list');
        lessons.forEach(lesson => {
            const card = document.createElement('div');
            card.className = 'lesson-card';
            card.innerHTML = `<div style="color:var(--primary-color); font-weight:bold; font-size: 1.2rem;">${lesson.id}</div><div>${lesson.title}</div>`;
            card.onclick = () => {
                document.getElementById('home-page').classList.add('hidden');
                document.getElementById('player-page').classList.remove('hidden');
                document.getElementById('display-title').innerText = lesson.title;
                bgMusic.pause();
                lessonAudio.src = lesson.audio;
                lessonAudio.play();
                document.getElementById('pdf-viewer').src = `https://docs.google.com/viewer?url=${encodeURIComponent(lesson.pdf)}&embedded=true`;
            };
            listContainer.appendChild(card);
        });

        function showHome() {
            document.getElementById('player-page').classList.add('hidden');
            document.getElementById('home-page').classList.remove('hidden');
            lessonAudio.pause();
            bgMusic.play();
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
